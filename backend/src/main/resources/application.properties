# =========== SERVER CONFIG ===========
server.port=9999

# =========== DATASOURCE CONFIG (Supabase PostgreSQL) ===========
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Defaults (HikariCP)
spring.datasource.hikari.maximum-pool-size=10

# =========== JPA / HIBERNATE CONFIG ===========
# Do dùng Flyway quản lý schema rồi nên Hibernate chỉ validate thôi, tránh làm hỏng DB
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========== FLYWAY MIGRATION ===========
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Bật baseline-on-migrate để dễ tạo lịch sử migrate lần đầu
spring.flyway.baseline-on-migrate=true

# =========== JWT SECURITY CONCEPT ===========
# Chuỗi secret key đủ mạnh (>= 256bit cho HMAC-SHA256)
app.security.jwt.secret-key=${JWT_SECRET_KEY}
app.security.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:60000}
app.security.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
app.security.jwt.refresh-token-cookie-secure=${JWT_REFRESH_TOKEN_COOKIE_SECURE:false}

# =========== LOGIN RATE LIMIT ===========
app.security.auth.login-rate-limit.max-attempts=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
app.security.auth.login-rate-limit.window-ms=${LOGIN_RATE_LIMIT_WINDOW_MS:300000}

# =========== AI SQL CHAT ==========
app.ai.sql.api-url=${AI_SQL_API_URL:https://api.openai.com/v1/chat/completions}
app.ai.sql.api-key=${OPENAI_API_KEY:}
app.ai.sql.model=${AI_SQL_MODEL:gpt-4o-mini}
app.ai.sql.timeout-ms=${AI_SQL_TIMEOUT_MS:60000}
app.ai.sql.explain-enabled=${AI_SQL_EXPLAIN_ENABLED:true}
app.ai.sql.explain-max-rows=${AI_SQL_EXPLAIN_MAX_ROWS:20}

# =========== PAYOS CONFIG ===========
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}

